<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background optional: can be transparent or use theme color -->
  <rect width="100" height="100" rx="12" fill="#131417"/>

  <!-- Simplified K design for icon -->
  <g fill="#3b82f6">
    <!-- Vertical stem -->
    <rect x="28" y="15" width="12" height="70" />
    <!-- Upper diagonal -->
    <polygon points="58,15 72,15 40,45" />
    <!-- Lower diagonal -->
    <polygon points="58,85 72,85 40,55" />
  </g>

  <!-- Accent dot at intersection -->
  <circle cx="50" cy="50" r="6" fill="#0ea5e9" />
</svg>